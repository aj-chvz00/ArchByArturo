follow_inside_symlinks "yes"
follow_outside_symlinks "yes"

# Location for database
db_file            "/home/Ragnar/.local/share/mpd/mpd.db"

# Logs to system journal
log_file           "syslog"

# The music directory is by default the XDG directory, uncomment to amend and choose a different directory
music_directory    "/home/Ragnar/storage/music"

# Uncomment to enable the functionalities
playlist_directory "/home/Ragnar/.local/share/mpd/playlists"
#pid_file           "~/.local/share/mpd/pid"
state_file         "/home/Ragnar/.local/share/mpd/mpdstate"
sticker_file       "/home/Ragnar/.local/share/mpd/sticker.sql"

# Uncomment to refresh the database whenever files in the music_directory are changed
auto_update "yes"

port "6600"

restore_paused "yes"
audio_output {
        type            "pulse"
        name            "pulse audio"
}

audio_output {
        type            "fifo"
        name            "ncmpcpp visualizer"
        path            "/tmp/mpd.fifo"
        format          "44100:16:1"
}
